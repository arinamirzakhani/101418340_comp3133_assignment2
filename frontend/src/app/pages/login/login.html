<div class="login-wrapper">
  <mat-card class="login-card">

    <h1 class="title">Employee Management</h1>
    <p class="subtitle">Sign in to your account</p>

    <form [formGroup]="form" (ngSubmit)="onLogin()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />

        <mat-error *ngIf="email?.touched && email?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="email?.touched && email?.hasError('email')">
          Enter a valid email
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" />

        <mat-error *ngIf="password?.touched && password?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="password?.touched && password?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <div *ngIf="errorMsg" style="color:#d32f2f; font-weight:600; margin: 8px 0;">
        {{ errorMsg }}
      </div>

      <button
        mat-raised-button
        color="primary"
        class="full-width login-btn"
        type="submit"
        [disabled]="form.invalid || loading"
      >
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <div class="signup-link">
      Don't have an account?
      <a routerLink="/signup">Sign up</a>
    </div>

  </mat-card>
</div>
