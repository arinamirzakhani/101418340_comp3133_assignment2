<div class="page-container">
  <mat-card class="form-card">

    <div class="form-header">
      <h2>Add New Employee</h2>
    </div>

    <form [formGroup]="employeeForm" (ngSubmit)="onSubmit()">

      <!-- Full Name -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="fullName" />
        <mat-icon matSuffix>person</mat-icon>

        <mat-error *ngIf="fullName?.touched && fullName?.hasError('required')">
          Full name is required
        </mat-error>
        <mat-error *ngIf="fullName?.touched && fullName?.hasError('minlength')">
          Full name must be at least 2 characters
        </mat-error>
      </mat-form-field>

      <!-- Position -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Position</mat-label>
        <input matInput formControlName="position" />
        <mat-icon matSuffix>work</mat-icon>

        <mat-error *ngIf="position?.touched && position?.hasError('required')">
          Position is required
        </mat-error>
      </mat-form-field>

      <!-- Department -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Department</mat-label>
        <input matInput formControlName="department" />
        <mat-icon matSuffix>business</mat-icon>

        <mat-error *ngIf="department?.touched && department?.hasError('required')">
          Department is required
        </mat-error>
      </mat-form-field>

      <!-- Email -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />
        <mat-icon matSuffix>email</mat-icon>

        <mat-error *ngIf="email?.touched && email?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="email?.touched && email?.hasError('email')">
          Enter a valid email
        </mat-error>
      </mat-form-field>

      <!-- Profile Picture Upload -->
      <div class="full-width" style="margin-top: 10px;">
        <label style="display:block; font-weight:600; margin-bottom:6px;">
          Profile Picture <span style="color:#d32f2f">*</span>
        </label>

        <input type="file" accept="image/*" (change)="onFileChange($event)" />

        <div *ngIf="selectedFile" style="margin-top:6px; font-size:13px;">
          Selected: <strong>{{ selectedFile.name }}</strong>
        </div>
      </div>

      <!-- Error message -->
      <div *ngIf="errorMsg" style="margin-top: 12px; color: #d32f2f; font-weight: 600;">
        {{ errorMsg }}
      </div>

      <div class="button-group">
        <button mat-stroked-button type="button" (click)="cancel()" [disabled]="loading">
          Cancel
        </button>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="employeeForm.invalid || loading">
          <mat-icon>save</mat-icon>
          {{ loading ? 'Saving...' : 'Save Employee' }}
        </button>
      </div>

    </form>

  </mat-card>
</div>
